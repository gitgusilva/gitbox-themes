name: Validate themes

on:
  pull_request:
    paths:
      - "themes/**"
      - "index.json"
      - "schema/**"
      - "scripts/**"
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Validate registry
        run: node scripts/validate.mjs
